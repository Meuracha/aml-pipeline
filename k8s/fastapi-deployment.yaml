apiVersion: apps/v1
kind: Deployment
metadata:
  name: aml-fastapi
  labels:
    app: aml-fastapi
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aml-fastapi
  template:
    metadata:
      labels:
        app: aml-fastapi
    spec:
      containers:
        - name: fastapi
          image: ghcr.io/meuracha/aml-pipeline/fastapi:latest
          ports:
            - containerPort: 8000
          env:
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: aml-secrets
                  key: postgres-host
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: aml-secrets
                  key: postgres-db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: aml-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aml-secrets
                  key: postgres-password
            - name: MINIO_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: aml-secrets
                  key: minio-endpoint
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aml-secrets
                  key: minio-access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aml-secrets
                  key: minio-secret-key
            - name: MLFLOW_TRACKING_URI
              valueFrom:
                secretKeyRef:
                  name: aml-secrets
                  key: mlflow-uri
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"   # scores.parquet 297MB loaded into RAM
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30   # wait for scores.parquet to load
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30