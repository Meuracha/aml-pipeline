apiVersion: v1
kind: Secret
metadata:
  name: aml-secrets
type: Opaque
stringData:
  postgres-host: "your-postgres-host"
  postgres-db: "aml_db"
  postgres-user: "your-user"
  postgres-password: "your-password"
  minio-endpoint: "http://your-minio:9000"
  minio-access-key: "your-access-key"
  minio-secret-key: "your-secret-key"
  mlflow-uri: "http://your-mlflow:5000"

# NOTE: do not commit real credentials — use a secrets manager
# (e.g. AWS Secrets Manager, GCP Secret Manager, HashiCorp Vault)
# or inject via CI/CD environment variables