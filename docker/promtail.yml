server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: airflow
    static_configs:
      - targets:
          - localhost
        labels:
          job: airflow
          __path__: /var/log/airflow/*.log

  - job_name: fastapi
    static_configs:
      - targets:
          - localhost
        labels:
          job: fastapi
          __path__: /opt/airflow/logs/**/*.log