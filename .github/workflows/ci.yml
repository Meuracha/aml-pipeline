name: CI — AML Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
  POSTGRES_DB: aml_db
  MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
  MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}

jobs:
  # ─────────────────────────────────────────
  # Job 1: Lint & Format
  # ─────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint dependencies
        run: pip install flake8 black isort

      - name: Check formatting (black)
        run: black --check --diff dags/ src/ tests/

      - name: Check import order (isort)
        run: isort --check-only --diff dags/ src/ tests/

      - name: Lint (flake8)
        run: |
          flake8 dags/ src/ tests/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503 \
            --exclude=__pycache__,.git

  # ─────────────────────────────────────────
  # Job 2: Security Scan
  # ─────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install security tools
        run: pip install bandit safety

      - name: Bandit security scan
        run: |
          bandit -r dags/ src/ \
            -ll \
            --exclude src/dashboard \
            -f json -o bandit-report.json || true
          bandit -r dags/ src/ -ll --exclude src/dashboard

      - name: Safety dependency check
        run: safety check -r requirements.txt --continue-on-error

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: bandit-report.json

  # ─────────────────────────────────────────
  # Job 3: Unit Tests
  # ─────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "starlette==0.36.3" "httpx==0.25.2"
          pip install pytest pytest-cov pytest-asyncio

      - name: Run unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          MINIO_ENDPOINT: http://localhost:9000
          AWS_ACCESS_KEY_ID: ${{ env.MINIO_ROOT_USER }}
          AWS_SECRET_ACCESS_KEY: ${{ env.MINIO_ROOT_PASSWORD }}
          MLFLOW_TRACKING_URI: http://localhost:5000
        run: |
          pytest tests/ \
            -v \
            --cov=src \
            --cov=dags \
            --cov-report=xml \
            --cov-report=term-missing \
            -m "not integration" \
            --tb=short

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Coverage summary
        uses: orgoro/coverage@v3
        if: github.event_name == 'pull_request'
        with:
          coverageFile: coverage.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          thresholdAll: 0.70
          thresholdNew: 0.80

  # ─────────────────────────────────────────
  # Job 4: DAG Validation
  # ─────────────────────────────────────────
  dag-validation:
    name: DAG Validation
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Airflow
        run: |
          pip install apache-airflow==2.10.5 \
            apache-airflow-providers-postgres \
            apache-airflow-providers-amazon

      - name: Validate DAG imports
        env:
          AIRFLOW__CORE__DAGS_FOLDER: ${{ github.workspace }}/dags
          AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////tmp/airflow.db
        run: |
          airflow db migrate
          python -c "
          import importlib, os, sys
          sys.path.insert(0, 'dags')
          dag_files = [f for f in os.listdir('dags') if f.endswith('.py') and not f.startswith('_')]
          for f in dag_files:
              module_name = f[:-3]
              try:
                  importlib.import_module(module_name)
                  print(f'✅ {f} — OK')
              except Exception as e:
                  print(f'❌ {f} — FAILED: {e}')
                  sys.exit(1)
          "

      - name: Check DAG structure
        run: |
          python tests/test_dags.py

  # ─────────────────────────────────────────
  # Job 5: Docker Build Test
  # ─────────────────────────────────────────
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build FastAPI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: false
          tags: aml-pipeline/fastapi:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Airflow image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.airflow
          push: false
          tags: aml-pipeline/airflow:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Streamlit image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.streamlit
          push: false
          tags: aml-pipeline/streamlit:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # Job 6: Model Validation Gate
  # ─────────────────────────────────────────
  model-validation:
    name: Model Validation Gate
    runs-on: ubuntu-latest
    needs: [test]
    if: contains(github.event.head_commit.message, '[retrain]')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ML dependencies
        run: pip install xgboost scikit-learn mlflow pandas pyarrow boto3

      - name: Validate model performance
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          AWS_ACCESS_KEY_ID: ${{ secrets.MINIO_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MLFLOW_S3_ENDPOINT_URL: ${{ secrets.MINIO_ENDPOINT }}
        run: python tests/test_ml.py --validate-production